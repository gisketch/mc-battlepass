recovery = ["There lies thine opening.", "Strike now, if courage holds.", "A gap. Willed by grace."]
taunt = ["Impatience is a hollow crown.", "Come then. Let grace judge.", "Think, Tarnished. Then act."]
guard_react = ["Thy haste is answered.", "A vowless swing breaks easily.", "Grace saw. I saw."]
parry = ["Turned by shield and grace.", "The shield holds.", "Thy ambition met a wall."]
hit_player = ["Endure. Rise yet again.", "Let pain temper thee.", "Thou art bloodied but unbowed."]
took_damage = ["Well struck, brave soul.", "A worthy blow.", "Thou hast the fire."]
victory = ["Rise, healed by grace.", "This trial is mine. Thou art restored.", "Defeat instructs. Stand."]
defeat = ["I yield. Grace has favored thee.", "Enough. Thy courage endured.", "Thou art worthy."]
