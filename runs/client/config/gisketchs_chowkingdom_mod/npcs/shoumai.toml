  { from_hour = 7, to_hour = 11, activity = "work" },
  { from_hour = 11, to_hour = 13, activity = "home" },
  { from_hour = 13, to_hour = 15, activity = "work" },
  { from_hour = 15, to_hour = 20, activity = "meetup" },
  { from_hour = 20, to_hour = 22, activity = "home" },
  { from_hour = 22, to_hour = 7, activity = "sleep" },
