needs_house_dialog = ["I finally have a body in this world, so yes, I would like an actual room. Use this rent contract on a bed and I can move in without judging your floor plan too much.", "Old server, I was just Discord messages. New server, one eye and an actual body. Progress. Now hand me a bed assignment with this contract."]
