[camper_messages]
# Config value: camper_messages.needs_house_balloon.
needs_house_balloon = ["A camp is cute. A room would be better.", "Last server I only had Discord. Now I need an actual bed.", "Body acquired. Housing still pending.", "I did not manifest into this world to sleep outside."]
