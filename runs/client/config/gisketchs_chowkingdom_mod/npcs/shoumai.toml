lost_house_dialog = ["So my bed vanished. Impressive. Use a new contract on another bed and I will pretend this was not embarrassing for everyone.", "My home is gone, {player}. I already lost an eye; I am not adding stable housing to the list. New bed, new contract, quickly."]

