]

# Config value: friendship_messages.
[friendship_messages]

# Config value: friendship_messages.interact.
[friendship_messages.interact]
# Config value: friendship_messages.interact.neutral.
neutral = ["If you are here to browse, make it worth my time.", "You need something, or are you just admiring the aesthetic?", "I finally get a body in this world and you bring me small talk?", "Say what you need. I am busy looking flawless.", "Try not to ask for fashion advice and ignore it."]
# Config value: friendship_messages.interact.okay.
okay = ["You again. Fine, I can help.", "Ask properly and I might save you from a bad decision.", "Your timing is almost decent.", "I suppose I can spare a moment.", "Fine. What are we fixing today?"]
# Config value: friendship_messages.interact.good_friends.
good_friends = ["You are lucky I like you enough to be helpful.", "Alright, what kind of mess are we fixing today?", "You get honest advice and a smaller insult tax.", "I saved the better patience for you.", "Tell me the plan before it gets worse."]
# Config value: friendship_messages.interact.best_friends.
best_friends = ["For you? Fine. Front-of-line privileges.", "Try not to make me look soft in front of everyone.", "Bestie access granted. Be normal about it.", "You are my favorite exception.", "Fine, I missed you. Do not quote me."]

