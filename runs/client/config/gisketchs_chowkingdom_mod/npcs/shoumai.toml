# Chow Kingdom config: shoumai.toml. Edit while the game is stopped, then run reload commands or restart.

# Config value: id.
id = "shoumai"
# Config value: name.
name = "Shou Mai"
# Config value: title.
title = "Chowess"
# Config value: skin.
skin = "gisketchs_chowkingdom_mod:npc/shoumai"
# Config value: body_type.
body_type = "slim"
# Config value: height.
height = 0.96
# Config value: weight.
weight = 0.86
# Config value: job.
job = "fashionista"
# Config value: hurt_messages.
hurt_messages = ["Watch the eye, {player}. I am not growing that back.", "Rude. I only have one good eye left.", "Hit me again and I start charging styling fees."]
# Config value: wake_messages.
wake_messages = ["If this is not important, go away.", "I was asleep, {player}. Make this worth it.", "You woke me up. Speak clearly."]
# Config value: npc_interaction_messages.
npc_interaction_messages = ["Judging {other}'s life choices. Kindly.", "Discussing kingdom standards with {other}.", "Explaining to {other} why presentation matters."]
# Config value: work_blocks.
work_blocks = [
  { id = "minecraft:loom", count = 1, display_name = "loom" },
  { id = "minecraft:chest", count = 1, display_name = "wardrobe chest" },
  { id = "minecraft:barrel", count = 1, display_name = "fabric barrel" },
  { id = "minecraft:item_frame", count = 2, display_name = "item frames" },
  { id = "minecraft:blue_ice", count = 2, display_name = "blue ice display blocks" },
  { id = "#minecraft:beds", count = 1, display_name = "bed" },
]

# Config value: job_definition.
[job_definition]
# Config value: job_definition.id.
id = "fashionista"
# Config value: job_definition.store.
store = "cosmetics"
# Config value: job_definition.scan_interval_ticks.
scan_interval_ticks = 60
# Config value: job_definition.roam_radius.
roam_radius = 6
# Config value: job_definition.work_scan_radius.
work_scan_radius = 8

# Config value: schedule.
[schedule]
# Config value: schedule.activities.
