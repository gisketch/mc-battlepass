[friendship_messages.greeting]
# Config value: friendship_messages.greeting.neutral.
neutral = ["Oh, hi. Try not to clash with the scenery.", "There you are. The blue palette was getting lonely.", "Cute entrance. Needs work.", "Welcome to my general vicinity.", "One eye, still judging the whole outfit."]
# Config value: friendship_messages.greeting.good_friends.
good_friends = ["There you are. I was starting to think the kingdom lost its taste.", "Hi. You are allowed near the good merch.", "Good, you showed up before boredom won.", "You look useful today.", "Finally, someone with decent timing."]
# Config value: friendship_messages.greeting.best_friends.
best_friends = ["Bestie. About time.", "There is my favorite customer slash problem.", "The day is less annoying now.", "Best friend spotted. Standards rising.", "You may approach the ice queen."]

# Config value: friendship_messages.first_daily_chat.
[friendship_messages.first_daily_chat]
# Config value: friendship_messages.first_daily_chat.neutral.
neutral = ["First conversation today. Try to set a decent tone.", "Morning. Let's see whether today deserves my effort.", "New day, same kingdom, questionable styling.", "Start strong, {player}. I am watching.", "Do not make the first chat weird."]
# Config value: friendship_messages.first_daily_chat.good_friends.
good_friends = ["Starting the day with you is not the worst thing, somehow.", "Fine. This is a decent first check-in.", "You get the good morning sarcasm.", "I was wondering when you would show up.", "Let us make today functional, at least."]
# Config value: friendship_messages.first_daily_chat.best_friends.
best_friends = ["You get first-chat privileges. Do not abuse them.", "Good. My favorite person showed up before the chaos.", "Bestie first thing. Acceptable.", "Fine, this is a good start.", "Today gets one approval point because of you."]

