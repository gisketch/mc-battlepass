[boss.balloons]
chase = ["One more run, {player}!", "No easy exits this time.", "Keep moving. The underworld loves a chase.", "You run like you have not died before.", "This is barely Asphodel pace!", "Faster! Father is not watching.", "Dash through. I will catch up.", "Running is half the fun, mate!", "Elysium teaches better footwork.", "You are not losing me that easy!"]
attack = ["Coming in hot!", "Mind the underworld hospitality!", "Stygius swings!", "Blood and darkness!", "A boon for your face!", "Zagreus special!", "Hot as the Phlegethon!", "Try dodging this one!", "House of Hades says hello!", "Aspect of aggression!"]
recovery = ["There you go. Take the opening.", "Your turn before Father critiques me.", "Gap! Use it before I recover!", "I dropped my guard. Shocking.", "Window open. Climb through.", "Quick! Achilles would be proud.", "An opening. Rare. Earned.", "Strike now! For the blood!", "Your chance. Do not waste it.", "Now! Before the boon refreshes!"]
taunt = ["Tempting gap, is it not?", "Go on. I promise it is only mostly a trap.", "You call that a dodge? Cute.", "I have died to worse. Much worse.", "Zagreus bait. Sixty percent effective.", "Come on. I mock Father harder than this.", "Skelly would block better than you.", "Is that your best? I am barely trying.", "You hit like Hypnos after a nap.", "The Pact demands better effort!"]
guard_react = ["Ah, you took the bait.", "Seen that one in Elysium.", "Predictable. Like Lernie's patterns.", "You swing like a shade.", "I know that attack. Old news.", "Thesius telegraphs less than you.", "Bait swallowed. Hook set.", "Read you like the Codex.", "That was a Tartarus-level swing.", "You ran right into it, mate."]
parry = ["Parried. Still alive? Good.", "Nice try. Bad boon.", "Denied! With underworld flair.", "Your blade met the Styx.", "Parry. Death denied.", "Deflected like Father's lectures.", "Not this run, friend.", "Blocked. Try a different keepsake.", "Your attack took a swim in the Styx.", "Redirected. Very olympian."]
hit_player = ["Sorry. Habit from home.", "That connected. You alright?", "Right in the blood. Sorry!", "You walked into that. Literally.", "Contact! Hope that did not sting.", "A love tap from the underworld.", "That one had a bit of red.", "Oof. You felt that. My bad.", "Landing hits is kind of my thing.", "Did not mean to hit that hard. Actually I did."]
took_damage = ["There it is! Good hit.", "Oof. That had Zagreus-removal energy.", "You drew blood! Excellent!", "A proper underworld blow!", "That one would impress Meg.", "Now we are fighting!", "Straight through! Well struck!", "Blood and darkness, that hurt. Good!", "You fight like you want to escape!", "Solid hit. Death-defying stuff!"]
