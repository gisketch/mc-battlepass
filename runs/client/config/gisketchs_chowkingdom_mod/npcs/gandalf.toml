okay = ["{quantity} {item}. Sensible.", "Good preparation: {quantity} {item}."]
good_friends = ["{quantity} {item}. May your road be safer.", "Take them, {player}. Use them with care."]
best_friends = ["For the road ahead: {quantity} {item}.", "Take {quantity} {item}. Come back with good news."]

[shop_messages.bulk]
neutral = ["A heavy pack for a long road.", "You prepare for serious work."]
okay = ["Wise. The road is rarely kind.", "Good. Prepared hearts endure."]
good_friends = ["You think ahead. That is well.", "That much {item} may save more than one life."]
best_friends = ["Take what you need, my friend.", "{quantity} {item}. Let no shadow find you unready."]

