wake_messages = ["I was not sleeping so deeply as you hoped.", "Speak, then. Time is shorter than it seems.", "If danger is near, say so plainly."]
npc_interaction_messages = ["Discussing old roads and darker powers with {other}.", "Asking {other} what rumors move through town.", "Teaching {other} that wisdom begins with listening."]
