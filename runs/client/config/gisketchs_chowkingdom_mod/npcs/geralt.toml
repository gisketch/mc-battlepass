recovery = ["Opening. Do not waste it.", "Now. Quick.", "There. Your window.", "Hit it before it closes.", "Gap in my guard. Rare.", "Strike fast. Thinking is later.", "That moment is yours.", "I left a door. Walk through.", "Window detected. Exploit.", "Your turn. Make it count."]
