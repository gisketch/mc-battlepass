hit_player = ["That one landed.", "Hm. You felt that.", "Pain teaches faster than words.", "You opened wide.", "Told you to dodge.", "That one had weight.", "Your ribs will remind you.", "Connected. Learn from it.", "You left your flank open.", "Good contact. Bad news for you."]
took_damage = ["Good. You noticed.", "Not bad. Still breathing.", "Hm. Decent form.", "First blood to you.", "You got through. Rare.", "Respect. That was clean.", "A witcher admits a good hit.", "You earned that touch.", "Better. Much better.", "That one stung. Well done."]
