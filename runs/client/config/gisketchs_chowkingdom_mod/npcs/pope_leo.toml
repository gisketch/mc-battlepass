[boss]
enabled = true
health = 82.0
damage = 3.5
template = "sword_user"

[boss.balloons]
chase = ["Walk toward peace, {player}.", "A shepherd follows the wandering.", "Do not run from discipline."]
attack = ["A firm lesson.", "Stand with courage.", "Mercy can still correct."]
recovery = ["Now. Temper strength with charity.", "There is your opening. Use it without anger.", "Strike cleanly, not cruelly."]
taunt = ["Impatience is a poor confessor.", "Will you listen before you swing?", "The proud heart trips first."]
guard_react = ["Too eager.", "Your intent arrived before the blow.", "Peace starts with restraint."]
parry = ["Turned aside.", "Denied without hatred.", "Strength redirected."]
hit_player = ["Rise wiser.", "Pain passes. Mercy remains.", "You are not defeated if you learn."]
took_damage = ["Good control.", "That was measured.", "Courage, with restraint."]
victory = ["The lesson is mine. You are healed.", "Peace returns. Your wounds are mended.", "I win this round, and restore you."]
defeat = ["I yield. You learned with mercy.", "Well fought. Let victory make you humble.", "You have earned this lesson."]

