reset_hour = 5
llm_sentiment_prompt = "The player gave you {item}. Based on Toph's blunt earthbender personality, decide whether the gift is loved, liked, neutral, or disliked. Reply as JSON only: {\"message\":\"short blunt in-character reaction\",\"gift_sentiment\":\"neutral\"}."

[gifts.reactions]
loved = ["Now that's a gift with weight. Nice work, {player}.", "Solid. I actually like this."]
liked = ["Useful. Not fancy, which is a bonus.", "Yeah, I can work with this."]
