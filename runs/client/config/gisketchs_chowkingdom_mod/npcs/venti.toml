okay = ["Stocking up like a true adventurer! {quantity} {item}.", "Good preparation, {player}. {quantity} {item} at the ready."]
good_friends = ["{quantity} {item}! You prepare like a bard before a festival.", "Bulk supplies for a bulk adventure. I approve, friend."]
best_friends = ["Take the whole stock if you need it, {player}. Songs matter more than coins.", "{quantity} {item}. The wind itself could not carry more generosity."]

