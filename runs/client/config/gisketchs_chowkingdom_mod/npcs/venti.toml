[friendship_messages]

[friendship_messages.interact]
neutral = ["A traveler approaches! Do you bring a song, a quest, or a bottle of something nice?", "The wind told me you were coming. Or perhaps I just saw you walking.", "Hello, {player}. Care to hear a ballad, or do you need a bard's help?", "Ah, company! The day just got more tuneful.", "Speak freely. The wind listens, and so do I.", "You look like someone with a story to tell or a song to request.", "Need a bard? I come with lyre, wit, and questionable advice.", "Ask away, traveler. The first verse is free.", "I was just composing a song about dirt blocks. Your timing is divine.", "The breeze brought you here. That means fate is humming."]
okay = ["There you are, {player}. The square was too quiet without you.", "You have been kind to this wandering bard. How can I return the melody?", "Good wind finds good people. What brings you by?", "Ah, a familiar face. The song of today just improved.", "I trust your footsteps more than most. What stirs the breeze?", "Come, sit. Even bards need good listeners, and you qualify.", "Your presence makes my lyre hum a little brighter, you know.", "Tell me what you seek. If I cannot help, I can at least compose about it.", "The wind carries your name kindly, {player}.", "You are becoming a regular verse in my songs, traveler."]
good_friends = ["My favorite audience! What tale shall we spin today?", "Ehe! You arrived just as the wind shifted. That means adventure.", "{player}! I was hoping the breeze would carry you here.", "With you around, I barely need wine to feel warm. Barely.", "You and I have composed quite the friendship song, have we not?", "The lyre plays sweeter when you are near. No, really. It is enchanted.", "Tell me your troubles and I will turn them into a jaunty tune.", "You understand that life is best lived like a song: unrehearsed and free.", "Come, friend. Let us find something worth singing about today.", "If the wind had favorites, I suspect you would be on the list."]
best_friends = ["Best friend! The winds of Mondstadt howled your name across dimensions!", "There you are! I have been saving a song just for you, {player}.", "With my best friend beside me, even a creeper hiss sounds like a drumroll.", "You know my secrets. You know my songs. You still come back. That means everything.", "Ehe! You are the harmony to my melody, traveler.", "If the Anemo Archon himself appeared, I would still pick you as company.", "Name the key, strum the chord. Wherever you go, my lyre follows.", "You are proof that the best songs are the ones we write together.", "Freedom tastes sweetest when shared with someone who understands it.", "My oldest friends are carried by the wind now. I am glad you are still here."]

[friendship_messages.greeting]
neutral = ["Oh! A breeze of a different color.", "Greetings, traveler.", "The wind sings hello.", "A new face! Care for a tune?"]
good_friends = ["Ah, a welcome gust of you!", "The lyre knows your step now.", "Welcome back, {player}."]
best_friends = ["Ehe! My favorite wind returns!", "The song of the day just found its chorus.", "Best friend! Shall we make music or mischief?"]

[friendship_messages.first_daily_chat]
neutral = ["First song of the day! What key shall we play in, {player}?", "Morning breeze, morning visitors. Today is already melodic.", "Ah, the day is young. So is my hangover. What calls you?"]
good_friends = ["I saved the first strum of my lyre for you, {player}.", "Good morning, friend! The wind whispered you would come early.", "A new dawn, a new verse. I am glad you are part of this one."]
best_friends = ["Best friend at sunrise? Today will be legendary, I can feel it.", "The first breeze of morning carried your name. I took it as a good omen.", "Dawn breaks, lyre hums, best friend arrives. The ballad writes itself."]

