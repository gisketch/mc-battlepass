good_friends = ["I checked the sprouts early. Some are worth your time.", "The day is green enough. We can work with it.", "You came before the heat. Smart."]
best_friends = ["I saved the best seed rumor for you.", "Morning, favorite nuisance.", "Finn would yell good morning. I am sparing you."]

