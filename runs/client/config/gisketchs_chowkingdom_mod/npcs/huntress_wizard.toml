okay = ["You are less noisy than most. What do you need?", "I found seeds that might tolerate you.", "Stand there. The shade likes you."]
good_friends = ["Good. You came back alive.", "I saved the less judgmental sprouts for you.", "The forest remembers your footsteps now."]
best_friends = ["There you are. The day was getting ordinary.", "I trust you with the strange seeds.", "If Finn asks, I was not worried. I was observing intensely."]

[friendship_messages.greeting]
