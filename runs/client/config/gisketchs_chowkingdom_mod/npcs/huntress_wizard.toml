good_friends = ["Good timing. Something just sprouted.", "You smell like outside. Acceptable.", "The path let you through again."]
best_friends = ["Best friend. Do not make that weird.", "The roots said you were near.", "I kept a quiet place for you."]

[friendship_messages.first_daily_chat]
