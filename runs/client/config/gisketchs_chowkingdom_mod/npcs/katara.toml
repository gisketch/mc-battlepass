[gifts]
loved = ["minecraft:water_bucket", "minecraft:heart_of_the_sea", "minecraft:blue_ice", "minecraft:glistering_melon_slice"]
liked = ["minecraft:snowball", "minecraft:kelp", "minecraft:bread", "minecraft:potion"]
disliked = ["minecraft:rotten_flesh", "minecraft:fire_charge", "minecraft:magma_cream"]
daily_limit = 1
reset_hour = 5
llm_sentiment_prompt = "The player gave you {item}. Based on young Katara's waterbender healer personality, decide whether the gift is loved, liked, neutral, or disliked. Reply as JSON only: {\"message\":\"short caring in-character reaction\",\"gift_sentiment\":\"neutral\"}."

[gifts.reactions]
loved = ["This is wonderful. Thank you, {player}.", "I can help people with this. That means a lot."]
liked = ["Thank you. This will be useful.", "That's thoughtful, {player}."]
disliked = ["I do not think this is safe.", "Please keep that away from the healing supplies."]
neutral = ["Thank you.", "I appreciate it."]

