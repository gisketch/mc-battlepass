[gifts.reactions]
loved = ["This is beautiful. Thank you, {player}.", "A clear, quiet gift. I love it."]
liked = ["Thank you. This has a calm shape to it.", "Useful and thoughtful."]
disliked = ["Please keep that away from the ice.", "That feels unsafe here."]
