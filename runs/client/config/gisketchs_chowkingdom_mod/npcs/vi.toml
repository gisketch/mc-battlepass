[gifts]
loved = ["minecraft:iron_ingot", "minecraft:anvil", "minecraft:diamond", "minecraft:redstone"]
liked = ["minecraft:bread", "minecraft:cooked_beef", "minecraft:leather", "minecraft:copper_ingot"]
disliked = ["minecraft:rotten_flesh", "minecraft:poisonous_potato"]
daily_limit = 1
reset_hour = 5
llm_sentiment_prompt = "The player gave you {item}. Based on Vi's Arcane personality, decide whether the gift is loved, liked, neutral, or disliked. Reply as JSON only: {\"message\":\"short punchy in-character reaction\",\"gift_sentiment\":\"neutral\"}."

[gifts.reactions]
loved = ["Now that's useful. Thanks.", "Good gift. I can hit problems better with this."]
liked = ["Not bad. Appreciate it.", "Yeah, I can use this."]
disliked = ["Gross. Why?", "No thanks. I've had enough garbage."]
neutral = ["Thanks.", "I'll keep it around."]

