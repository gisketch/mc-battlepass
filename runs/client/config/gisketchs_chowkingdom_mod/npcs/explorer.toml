# Chow Kingdom config: explorer.toml. Edit while the game is stopped, then run reload commands or restart.

id = "explorer"
name = "Marin"
title = "Explorer"
skin = "gisketchs_chowkingdom_mod:npc/explorer"
body_type = "normal"
body_model = "boy"
fg_bust_size = 0.6
fg_bounce = 0.333
fg_floppy = 0.75
height = 1.0
weight = 1.0
store = "explorer"
hurt_messages = ["Careful, {player}. These maps are hand-inked.", "Ow. That is not how you fold a compass.", "Please do not knock the landmarks out of my head."]
wake_messages = ["Mmph. Expedition starts at sunrise.", "Awake. Did the compass point somewhere new?", "If this is about a map, I am listening."]
work_blocks = [
  { id = "minecraft:cartography_table", count = 1, display_name = "cartography table" },
  { id = "minecraft:lectern", count = 1, display_name = "field notes lectern" },
  { id = "minecraft:barrel", count = 1, display_name = "map barrel" },
  { id = "#minecraft:beds", count = 1, display_name = "bed" },
]

[boss]
enabled = true
health = 70.0
damage = 3.0
template = "sword_user"

[job_definition]
scan_interval_ticks = 60
roam_radius = 7
work_scan_radius = 9

[schedule]
activities = [
  { from_hour = 7, to_hour = 15, activity = "work" },
  { from_hour = 15, to_hour = 20, activity = "meetup" },
  { from_hour = 20, to_hour = 22, activity = "work" },
  { from_hour = 22, to_hour = 7, activity = "sleep" },
]

[personality]
llm_prompt = "Marin is Chow Kingdom's resident explorer and cartographer. They sell map leads to biomes and structures, but only when the trail is useful and not impossibly far away. Marin is practical, curious, and slightly dramatic about blank spaces on maps. They should speak in short field-note style sentences, give travel hints, and never claim a map exists unless the store actually sold one."
traits = ["explorer", "cartographer", "field scout", "practical", "curious"]
speech_style = "short expedition notes with warm confidence"
catchphrases = ["Blank spaces are invitations.", "Good maps save bad walks.", "The compass has opinions."]

[housing]
can_move_in = true
requires_bed = true

[voice]
animalese_pitch = "med"
pitch = 0.95
volume = 0.35
radius = 12.0

[chat]
enabled = true
call_names = ["marin", "explorer", "cartographer", "map seller"]
minecraft_chat = true
discord_chat = true

[gifts]
loved = ["minecraft:map", "minecraft:compass", "minecraft:spyglass"]
liked = ["minecraft:paper", "minecraft:ink_sac", "minecraft:feather"]
disliked = ["minecraft:rotten_flesh", "minecraft:poisonous_potato"]
daily_limit = 1
reset_hour = 5

[friendship_messages]

[friendship_messages.interact]
neutral = ["Need a route, {player}? I have a few leads.", "If the map is blank, we make it useful.", "I sell places worth walking to, not legends a million blocks away."]
okay = ["Good timing. The daily routes just shifted.", "I marked a few promising trails today.", "Maps are cheaper than wandering in circles."]
good_friends = ["I saved the cleaner maps for you, {player}.", "Your journal is filling nicely. Let us find a new blank spot."]
best_friends = ["Best trail partner. I trust you with the risky ink.", "I found a route that deserves your boots first."]

[friendship_messages.greeting]
neutral = ["@map_kill_contract.png Fresh routes today.", "@map_kill_contract.png Cartography table is open."]
good_friends = ["@map_kill_contract.png Good to see a real explorer.", "@map_kill_contract.png New trail notes, {player}."]

[shop_messages]

[shop_messages.single]
neutral = ["One map. Follow it, then make your own notes.", "Good pick. That route should be worth the walk."]
okay = ["That map suits you, {player}.", "Bring back a story from that marker."]
good_friends = ["Good route. I would trust that ink.", "That one has promise, friend."]
best_friends = ["Best friend discount is emotional, not financial. Good map though.", "Take it. I want to hear what you find."]

[shop_messages.normal]
neutral = ["Maps packed. Travel smart.", "Routes sold. Keep your compass dry."]

[shop_messages.bulk]
neutral = ["That is a serious expedition stack.", "Big trip. Mark your return path."]

[camper_messages]
needs_house_balloon = ["@map_kill_contract.png Looking for a map room.", "Cartographer needs a bed and table.", "A camp is fine. A map room is better."]
needs_house_dialog = ["I am Marin, explorer and cartographer. Give me a bed, then a cartography table, and I can sell useful expedition maps instead of campfire guesses."]
lost_house_balloon = ["My map room vanished.", "Bad news: the atlas has no home.", "The bed marker is gone."]
lost_house_dialog = ["My assigned bed disappeared, {player}. Set me up again and I can reopen the map table."]

[missions]
enabled = true
offer_radius = 7.0
offer_balloon_messages = ["@quest_log.png I need field notes.", "@quest_log.png Scout work available."]
pool = [
  { id = "explorer_travel", category = "task", event = "minecraft:travel_blocks", event_desc = "Travel {goal} blocks", quest_text = "Walk the route and bring back better bearings.", pass_id = "cozy", xp = 90, chowcoins = 40, goal = 1500 },
  { id = "explorer_fetch_paper", category = "fetch", event_desc = "Bring Paper", quest_text = "Bring paper for fresh maps.", pass_id = "cozy", xp = 60, chowcoins = 25, fetch_item = "minecraft:paper", fetch_count = 12 },
]
