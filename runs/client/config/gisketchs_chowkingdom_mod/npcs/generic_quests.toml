  { item = "farmersdelight:vegetable_soup", process = "cook", qty = 1, xp = 120, chowcoins = 60, weight = 6, quest_text = "Cook vegetable soup after accepting this order, then bring it back." },
  { item = "farmersdelight:fried_rice", process = "cook", qty = 1, xp = 130, chowcoins = 70, weight = 5, quest_text = "Cook fried rice after accepting this order, then bring it back." },
  { item = "farmersdelight:dumplings", process = "cook", qty = 2, xp = 120, chowcoins = 60, weight = 6, quest_text = "Cook dumplings after accepting this order, then bring them back." },
  { item = "farmersdelight:mixed_salad", process = "craft", qty = 1, xp = 100, chowcoins = 45, weight = 5, quest_text = "Prepare a fresh mixed salad after accepting this order, then bring it back." },
  { item = "farmersdelight:barbecue_stick", process = "craft", qty = 2, xp = 100, chowcoins = 45, weight = 5, quest_text = "Prepare barbecue sticks after accepting this order, then bring them back." },
