# Chow Kingdom NPC generic quests.
# Shared pools in this file are auto-added to every NPC with missions enabled.
# NPC TOMLs can add [unique_quests] with the same fetch/kill/timed/travel/craft/smelt/eat/quiz/food_chain_quest shape.

enabled = true

[fetch]
pool = [
  { item = "minecraft:apple", qty = 8, xp = 70, chowcoins = 25, weight = 10, quest_text = "Bring fresh apples for town supplies." },
  { item = "minecraft:bread", qty = 6, xp = 70, chowcoins = 25, weight = 10, quest_text = "Bring bread for the shared pantry." },
  { item = "minecraft:iron_ingot", qty = 6, xp = 90, chowcoins = 40, weight = 6, quest_text = "Bring iron for repairs around town." },
  { item = "minecraft:ender_pearl", qty = 2, xp = 130, chowcoins = 75, weight = 2, quest_text = "Bring ender pearls for risky field work." },
]

[timed.easy_mobs]
pool = [
  { entity = "minecraft:zombie", qty = 4, time_window_seconds = 25, dimension = "minecraft:overworld", xp = 100, chowcoins = 50, weight = 10, quest_text = "Thin out a fast wave of zombies before they wander into town." },
  { entity = "minecraft:skeleton", qty = 4, time_window_seconds = 25, dimension = "minecraft:overworld", xp = 100, chowcoins = 50, weight = 10, quest_text = "Break a skeleton line before it can regroup." },
  { entity = "minecraft:spider", qty = 3, time_window_seconds = 20, dimension = "minecraft:overworld", xp = 100, chowcoins = 50, weight = 8, quest_text = "Clear a quick spider rush from the paths before nightfall." },
]

[timed.rare_mobs]
pool = [
  { entity = "minecraft:blaze", qty = 3, time_window_seconds = 30, dimension = "minecraft:the_nether", xp = 180, chowcoins = 100, weight = 3, quest_text = "Drop a blaze patrol before the fire spreads." },
  { entity = "minecraft:cave_spider", qty = 3, time_window_seconds = 25, xp = 150, chowcoins = 80, weight = 3, quest_text = "Clear a cave spider pocket before it scatters." },
  { entity = "minecraft:wither_skeleton", qty = 2, time_window_seconds = 30, dimension = "minecraft:the_nether", xp = 220, chowcoins = 150, weight = 1, quest_text = "Cut down wither skeletons in one clean push." },
]

[travel]
pool = [
  { mode = "on_foot", qty = 1000, xp = 80, chowcoins = 25, weight = 10, quest_text = "Scout the roads on foot. No mounts, no flying." },
  { mode = "pokemon_land", qty = 1500, xp = 90, chowcoins = 35, weight = 7, quest_text = "Ride a land Pokemon along the routes and check the roads." },
  { mode = "pokemon_flying", qty = 2000, xp = 110, chowcoins = 50, weight = 5, quest_text = "Fly on a Pokemon and survey the town from above." },
]

[craft]
pool = [
  { item = "minecraft:torch", qty = 32, xp = 80, chowcoins = 25, weight = 8, quest_text = "Craft torches for safer routes." },
  { item = "minecraft:chest", qty = 4, xp = 70, chowcoins = 25, weight = 6, quest_text = "Craft chests for storage work." },
]

[smelt]
pool = [
  { item = "minecraft:iron_ingot", qty = 8, xp = 90, chowcoins = 40, weight = 8, quest_text = "Smelt iron for town maintenance." },
  { item = "minecraft:glass", qty = 16, xp = 80, chowcoins = 30, weight = 6, quest_text = "Smelt glass for repairs and displays." },
]

[eat]
pool = [
  { item = "minecraft:bread", qty = 3, xp = 60, chowcoins = 20, weight = 8, quest_text = "Eat proper food before more work stacks up." },
  { item = "minecraft:cooked_beef", qty = 3, xp = 70, chowcoins = 25, weight = 6, quest_text = "Eat a solid meal before patrol." },
]

[quiz]
pool = [
  { quiz_topic = "town lore", xp = 80, chowcoins = 25, weight = 4, quest_text = "Answer a quick town lore question." },
  { quiz_topic = "recent events", xp = 90, chowcoins = 35, weight = 4, quest_text = "Answer a question about what has been happening lately." },
  { quiz_topic = "NPC personality and work", xp = 80, chowcoins = 25, weight = 3, quest_text = "Answer a question from the NPC's own point of view." },
]

[catch_pokemon]
pool = [
  { pokemon_type = "water", qty = 3, xp = 110, chowcoins = 50, weight = 6, quest_text = "Catch Water Pokemon for field support." },
  { pokemon_type = "fire", qty = 3, xp = 110, chowcoins = 50, weight = 6, quest_text = "Catch Fire Pokemon for field notes." },
  { category = "starter", qty = 1, xp = 140, chowcoins = 75, weight = 2, quest_text = "Catch a starter Pokemon for special records." },
]

