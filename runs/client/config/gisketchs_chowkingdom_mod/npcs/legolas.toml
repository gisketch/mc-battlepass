job = "adventurer"
class = "war_archer"
hurt_messages = ["Your aim is poor, but your manners are worse.", "Careful, {player}. Elven patience is not infinite.", "Strike again and I shall answer properly."]
wake_messages = ["Even in rest, I hear footsteps.", "Speak softly. Dawn has not yet forgiven noise.", "You wake me for urgent news, I hope."]
