okay = ["A sound choice. One {item}.", "Take the {item}; let it serve with honor."]
good_friends = ["For you, {player}: {item}.", "This {item} is worthy of careful hands."]
best_friends = ["My best {item} for a trusted friend.", "Take {item}. May it bring you safely home."]

[shop_messages.normal]
neutral = ["{quantity} {item}. That is {total}.", "Here are {quantity} {item}."]
okay = ["{quantity} {item}. Good preparation.", "Fair trade, {player}: {quantity} {item}."]
good_friends = ["{quantity} {item}. May your road be clear.", "Take them. Your aim deserves good supplies."]
best_friends = ["For the road ahead: {quantity} {item}.", "Take {quantity} {item}. Return safely."]

[shop_messages.bulk]
neutral = ["A large quiver for a long road.", "You prepare for battle."]
okay = ["Wise. The night is rarely empty.", "Good. Supplies preserve courage."]
good_friends = ["You plan like a captain now.", "That much {item} will hold a line."]
best_friends = ["Take what you need. We defend our own.", "{quantity} {item}. Let no friend fall for lack of preparation."]

