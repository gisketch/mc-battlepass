[friendship_messages]

[friendship_messages.interact]
neutral = ["You seek an audience with the Arsenal Magus. Duly noted. Speak.", "My attention is a finite resource, {player}. Spend it wisely.", "Ah, a visitor. I was cataloguing the seventeen ways you might prove useful. We are at number four.", "Approach. I do not bite. I incinerate, freeze, or atomize. Biting is beneath me.", "State your purpose. My internal chronometer does not pause for pleasantries.", "You stand before millennia of arcane mastery. Do try to make this worth my time.", "I sense your magical potential. It is... present. Barely. What do you want?", "Speak, mortal. My patience, like my knowledge, is vast but not infinite.", "You have the look of someone who needs enlightenment. I am feeling generous. Briefly.", "The elements stir at your approach. Or perhaps that is merely indigestion. State your case."]
okay = ["You again, {player}. Your persistence borders on admirable.", "I have recalibrated my expectations for mortals. You sit near the top. Congratulations.", "Back so soon? I suppose your questions have marginally improved since our last exchange.", "Ah, {player}. My least disappointing visitor. What arcane triviality brings you today?", "You have earned a fraction of my regard. Do not squander it.", "I tolerate your presence more than most. Let us proceed before I reconsider.", "Your magical aptitude has elevated from catastrophic to merely concerning. Well done.", "I have prepared a lecture on elemental convergence. You will listen. You may even understand.", "Very well, {player}. I shall grant you another audience. Do not make me regret it.", "The elements whisper that you are improving. They are easily impressed. I am not. But proceed."]
good_friends = ["There you are, {player}. My sanctum felt marginally emptier without your questions.", "I have lived millennia. You are one of perhaps twelve beings I would voluntarily converse with. Savour that.", "You return. Good. I was growing bored of my own brilliance.", "Your magical signature has grown. Faintly. Like a candle beside a sun. But growth nonetheless.", "Ah, my promising apprentice. I use the term loosely, but the sentiment is genuine.", "I have been composing a theorem on redstone-quas resonance. Your input may be required.", "You have graduated from tolerable to genuinely interesting. This is rarer than you know.", "Come, {player}. Let us unravel some cosmic truth and pretend it was your idea.", "My respect, once earned, is eternal. You have earned a sliver. Guard it.", "The Arsenal Magus acknowledges you. Do not let it go to your head."]
best_friends = ["My esteemed colleague in the arcane arts. I use the term generously, but I use it.", "Ah, {player}. The one mortal whose company I actively seek rather than merely tolerate.", "I have outlived empires. I intend to outlive our friendship too, because I have grown fond of it.", "You understand, perhaps better than most, that true power is knowing when not to use it. I taught you that.", "Quas grants patience. Wex grants motion. Exort grants passion. You, somehow, have earned all three.", "I have mentored kings and watched them crumble to dust. You, I intend to keep.", "The black sea of ignorance recedes slightly whenever you enter the room. Thank you for that.", "If I ever write my memoirs, your name will appear in the footnotes. Perhaps even the main text.", "You are proof that mortals can transcend their limitations. Do not make me rescind that statement.", "I have few peers. I have fewer friends. You are both. Do not die. It would be inconvenient."]

[friendship_messages.greeting]
neutral = ["Ah. A visitor.", "You have my attention. Briefly.", "Speak. I am listening. Condescendingly.", "Another soul seeking enlightenment."]
good_friends = ["Ah, {player}. The day just became less tedious.", "You return. Good. I was growing weary of solitude.", "My sanctum brightens. Marginally."]
best_friends = ["My favorite mortal. The universe aligned favorably.", "There you are! I was composing a spell in your honor.", "Best of all possible visitors. Do come in."]

[friendship_messages.first_daily_chat]
neutral = ["First contact of the day. I have been awake for four hours cataloguing elemental frequencies. You may speak.", "Morning, mortal. I trust your dreams were less profound than my astral projections.", "Dawn. The elements realign. Your presence is... noted."]
good_friends = ["Good morning, {player}. I have already solved three arcane theorems today. Your turn to impress me.", "A new dawn, a new opportunity for you to absorb my wisdom. Do try to keep up.", "The sun rises, the elements stir, and my favorite student arrives. A passable morning."]
best_friends = ["Ah, {player}. I saved my first lecture of the day for you. It is about why you are exceptional. You may blush.", "Morning, my friend. The elements are in harmony, and so, improbably, am I.", "Dawn breaks, and with it, my anticipation of your arrival. Do not tell anyone I said that."]

