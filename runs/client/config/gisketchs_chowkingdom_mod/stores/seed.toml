# CKDM Seed Merchant
# Balanced crop/seed/sapling shop.
#
# Design:
# - Common crop seeds appear daily and are affordable.
# - Uncommon/biome seeds rotate daily/weekly with moderate stock.
# - Cobblemon apricorn sprouts move here from the Pokémon shop.
# - Apricorn saplings are weekly and expensive because they establish long-term production.
# - Mint seeds are weekly, very expensive, and stock 1 because they are renewable rare economy/progression items.
# - Minecells putrid saplings are end-game weekly prestige/collection stock.
#
# Prices are intentionally much higher than shipping prices because seeds create future production.
# Do not price seed merchant items based on the sell value of one crop; price them based on unlock value.

