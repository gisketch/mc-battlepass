# CKDM Cosmetics Shop
# Generated rotation balance:
# - daily_sets = common/cute/workwear/casual outfits that can rotate often
# - weekly_sets = prestige, fantasy armor, crowns, rare armor, luxury sets
# - Fantasy Armor intentionally stays weekly and expensive as the long-term Chowcoin sink
#
id = "cosmetics"
display_name = "Cosmetics Shop"
time_zone = "GMT+8"
reset_hour = 5
reset_minute = 0

# Generated for CKDM from the categorized cosmetics dataset.
# Philosophy: food/shipping makes money slowly; cosmetics are the long-term Chowcoin sink.
# Fantasy Armor is intentionally expensive and rotates weekly as prestige sets.

