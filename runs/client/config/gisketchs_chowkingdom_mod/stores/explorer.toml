# Explorer store V2.
# Each row expands at store refresh into live registry tag categories:
#   target_type + dimension + distance_bands + auto category -> generated offer.
# Daily favors near/far. Weekly uses very_far.

id = "explorer"
display_name = "Explorer Compasses"
time_zone = "GMT+8"
reset_hour = 5
reset_minute = 0

[[categories]]
id = "biomes"
item_types_to_sell = 2
daily_item_types_to_sell = 2
weekly_item_types_to_sell = 1

[[categories.daily_items]]
id = "daily_overworld_biomes"
offer_type = "explorer_compass"
target_type = "biome"
dimension = "minecraft:overworld"
distance_bands = ["near", "far"]
price_amount = 1800
stock_count = 1
weight = 4

