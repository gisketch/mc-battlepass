# CKDM Cobblemon Shop
# Balanced Pokémon utility shop.
#
# Design:
# - Daily stock = normal adventuring supplies, common berries, apricorn basics, light medicine.
# - Weekly stock = limited progression, special balls, fossils, held items, mints, evolution items.
# - Excluded by design = Master Ball, Cherish Ball, Park Ball, Ancient Origin Ball, NPC editor,
#   relic coin, ability patch by default, and other items that should be event/battlepass/admin-only.
#
# Store set behavior:
# - item_types_to_sell counts sets and single entries as roll groups.
# - daily_item_types_to_sell and weekly_item_types_to_sell split daily/weekly roll counts.
# - If a set is selected, all items inside that set appear together.

